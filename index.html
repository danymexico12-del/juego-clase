<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Qué Cultura Organizacional Eres? | Empresas Mexicanas</title>
    <style>
        :root {
            --primary: #c62828;
            --secondary: #1e88e5;
            --accent: #43a047;
            --dark: #1a1a1a;
            --light: #f8f9fa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
            color: #333;
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 860px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, var(--primary), #e53935);
            color: white;
            padding: 40px 30px;
            text-align: center;
            position: relative;
        }

        .logo {
            max-width: 190px;
            margin-bottom: 15px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }

        h1 {
            font-size: 2.6em;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 1.35em;
            opacity: 0.95;
            font-weight: 400;
        }

        .badge {
            position: absolute;
            top: 25px;
            right: 30px;
            background: rgba(255,255,255,0.2);
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.95em;
            backdrop-filter: blur(10px);
        }

        .content {
            padding: 45px 40px;
        }

        #question-text {
            font-size: 1.55em;
            color: var(--dark);
            margin-bottom: 32px;
            font-weight: 600;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .option {
            padding: 22px 24px;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 1.1em;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .option:hover {
            border-color: var(--secondary);
            background: #f0f9ff;
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(30, 136, 229, 0.15);
        }

        .option.selected {
            background: #f0fdf4;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(67, 160, 71, 0.15);
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 40px;
        }

        button {
            padding: 16px 36px;
            font-size: 1.1em;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        #next-btn {
            background: var(--primary);
            color: white;
        }

        #next-btn:hover {
            background: #b71c1c;
            transform: translateY(-3px);
        }

        #prev-btn {
            background: transparent;
            color: #64748b;
            border: 2px solid #cbd5e1;
        }

        #prev-btn:hover {
            background: #f1f5f9;
        }

        .result {
            display: none;
            text-align: center;
        }

        .culture-card {
            background: linear-gradient(135deg, #f8fafc, #f1f5f9);
            border-radius: 20px;
            padding: 40px 30px;
            margin: 30px 0;
            border: 1px solid #e2e8f0;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        .emoji {
            font-size: 5.5em;
            margin-bottom: 20px;
            display: block;
            line-height: 1;
        }

        .culture-card h2 {
            font-size: 2.1em;
            color: var(--primary);
            margin-bottom: 20px;
        }

        h3 {
            color: var(--dark);
            margin: 30px 0 15px 0;
            font-size: 1.4em;
        }

        ul {
            list-style: none;
            max-width: 420px;
            margin: 0 auto 30px;
            text-align: left;
        }

        ul li {
            padding: 10px 0;
            font-size: 1.08em;
            position: relative;
            padding-left: 30px;
        }

        ul li:before {
            content: "✓";
            color: var(--accent);
            font-weight: bold;
            position: absolute;
            left: 0;
        }

        #examples {
            font-size: 1.25em;
            color: var(--primary);
            font-weight: 700;
            background: #fef2f2;
            padding: 15px 25px;
            border-radius: 12px;
            display: inline-block;
            margin: 10px 0 30px 0;
        }

        .progress {
            height: 6px;
            background: #e2e8f0;
            margin-bottom: 35px;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(to right, var(--primary), #ef5350);
            width: 0%;
            transition: width 0.4s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <img src="https://postimg.cc/LJc7x94j" alt="Logo UTEL" class="logo">
            <h1>¿Qué Cultura Organizacional Eres?</h1>
            <p class="subtitle">Descubre con qué tipo de empresa mexicana te identificas más</p>
            <div class="badge">Empresas Mexicanas Edition 🇲🇽</div>
        </header>

        <div class="content">
            <!-- Barra de progreso -->
            <div class="progress">
                <div id="progress-bar" class="progress-bar"></div>
            </div>

            <!-- Quiz -->
            <div id="quiz">
                <h2 id="question-text">Pregunta 1 de 5</h2>
                <div class="options" id="options"></div>

                <div class="navigation">
                    <button id="prev-btn" onclick="prevQuestion()">← Anterior</button>
                    <button id="next-btn" onclick="nextQuestion()">Siguiente →</button>
                </div>
            </div>

            <!-- Resultado -->
            <div id="result" class="result">
                <h2>¡Felicidades! Esta es tu cultura:</h2>
                
                <div id="culture-result" class="culture-card">
                    <!-- Se llena con JavaScript -->
                </div>

                <h3>¿Qué significa esto?</h3>
                <p id="description" style="font-size: 1.15em; max-width: 620px; margin: 0 auto 25px;"></p>

                <h3>Beneficios principales:</h3>
                <ul id="benefits"></ul>

                <h3>Ejemplos de empresas mexicanas:</h3>
                <p id="examples"></p>

                <button onclick="reiniciarJuego()" style="margin-top: 20px; font-size: 1.15em; padding: 18px 40px;">
                    Realizar el test nuevamente
                </button>
            </div>
        </div>
    </div>

    <script>
        // (El JavaScript es el mismo que te di en la versión anterior, solo agregué la barra de progreso)

        const preguntas = [ /* ... mismo array de preguntas que antes ... */ ];

        let respuestas = [];
        let preguntaActual = 0;

        function actualizarProgreso() {
            const porcentaje = ((preguntaActual) / preguntas.length) * 100;
            document.getElementById("progress-bar").style.width = `${porcentaje}%`;
        }

        function mostrarPregunta() {
            document.getElementById("question-text").textContent = 
                `Pregunta ${preguntaActual + 1} de ${preguntas.length}`;

            const optionsDiv = document.getElementById("options");
            optionsDiv.innerHTML = "";

            preguntas[preguntaActual].opciones.forEach((opcion, index) => {
                const div = document.createElement("div");
                div.className = "option";
                div.textContent = opcion.texto;
                div.onclick = () => seleccionarRespuesta(index);
                optionsDiv.appendChild(div);
            });

            actualizarProgreso();
            actualizarBotones();
        }

        // Resto del JavaScript (seleccionarRespuesta, nextQuestion, prevQuestion, calcularCultura, mostrarResultado, reiniciarJuego)
        // Usa exactamente el mismo código que te di en la respuesta anterior

        function seleccionarRespuesta(index) {
            respuestas[preguntaActual] = preguntas[preguntaActual].opciones[index].valor;
            const options = document.querySelectorAll(".option");
            options.forEach((opt, i) => opt.classList.toggle("selected", i === index));
            actualizarBotones();
        }

        function actualizarBotones() {
            document.getElementById("next-btn").style.display = respuestas[preguntaActual] ? "block" : "none";
            document.getElementById("prev-btn").style.display = preguntaActual > 0 ? "block" : "none";
        }

        function nextQuestion() {
            if (respuestas[preguntaActual]) {
                preguntaActual++;
                if (preguntaActual < preguntas.length) {
                    mostrarPregunta();
                } else {
                    mostrarResultado();
                }
            }
        }

        function prevQuestion() {
            if (preguntaActual > 0) {
                preguntaActual--;
                mostrarPregunta();
            }
        }

        function calcularCultura() {
            const conteo = { familiar: 0, creativa: 0, competitiva: 0, estructurada: 0 };
            respuestas.forEach(res => conteo[res]++);
            
            let max = -1;
            let culturaGanadora = "familiar";
            for (let tipo in conteo) {
                if (conteo[tipo] > max) {
                    max = conteo[tipo];
                    culturaGanadora = tipo;
                }
            }
            return culturaGanadora;
        }

        function mostrarResultado() {
            document.getElementById("quiz").style.display = "none";
            document.getElementById("result").style.display = "block";

            const tipo = calcularCultura();
            let titulo = "", emoji = "", descripcion = "", beneficios = [], ejemplos = "";

            switch(tipo) {
                case "familiar":
                    titulo = "Cultura Familiar";
                    emoji = "👨‍👩‍👧‍👦";
                    descripcion = "Trabajas mejor en entornos cálidos donde se valora la confianza, el apoyo y las relaciones personales.";
                    beneficios = ["Alta lealtad y compromiso", "Baja rotación", "Excelente clima laboral"];
                    ejemplos = "Grupo Bimbo, FEMSA (OXXO), Liverpool, Grupo México";
                    break;
                case "creativa":
                    titulo = "Cultura Creativa / Innovadora";
                    emoji = "💡";
                    descripcion = "Te motiva un ambiente dinámico donde las ideas nuevas, la innovación y la flexibilidad son bienvenidas.";
                    beneficios = ["Alta innovación", "Rápida adaptación al cambio", "Ambiente estimulante"];
                    ejemplos = "Kavak, Clip, Cinépolis, Rappi México";
                    break;
                case "competitiva":
                    titulo = "Cultura Competitiva / de Resultados";
                    emoji = "🏆";
                    descripcion = "Te identificas con empresas enfocadas en ganar mercado, superar metas y premiar el alto desempeño.";
                    beneficios = ["Crecimiento acelerado", "Alta productividad", "Recompensas por resultados"];
                    ejemplos = "América Móvil (Telcel), Grupo Salinas, Cemex (en algunos áreas)";
                    break;
                case "estructurada":
                    titulo = "Cultura Estructurada / Jerárquica";
                    emoji = "📋";
                    descripcion = "Prefieres entornos con procesos claros, orden, estabilidad y reglas bien definidas.";
                    beneficios = ["Estabilidad laboral", "Eficiencia operativa", "Claridad en roles y responsabilidades"];
                    ejemplos = "Banorte, Pemex, CFE, Grupo Financiero Banorte";
                    break;
            }

            document.getElementById("culture-result").innerHTML = `
                <span class="emoji">${emoji}</span>
                <h2>${titulo}</h2>
            `;

            document.getElementById("description").textContent = descripcion;

            const benefitsList = document.getElementById("benefits");
            benefitsList.innerHTML = "";
            beneficios.forEach(b => {
                const li = document.createElement("li");
                li.textContent = b;
                benefitsList.appendChild(li);
            });

            document.getElementById("examples").innerHTML = `<strong>${ejemplos}</strong>`;
        }

        function reiniciarJuego() {
            respuestas = [];
            preguntaActual = 0;
            document.getElementById("quiz").style.display = "block";
            document.getElementById("result").style.display = "none";
            mostrarPregunta();
        }

        window.onload = mostrarPregunta;
    </script>
</body>
</html>
