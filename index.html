<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Qué Cultura Organizacional Eres? | Empresas Mexicanas</title>
    <style>
        :root {
            --primary: #c62828;
            --secondary: #1e88e5;
            --accent: #43a047;
            --dark: #1a1a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
            color: #333;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 860px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, var(--primary), #e53935);
            color: white;
            padding: 40px 30px;
            text-align: center;
            position: relative;
        }

        .logo {
            max-width: 190px;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 2.6em;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 1.35em;
            opacity: 0.95;
        }

        .badge {
            position: absolute;
            top: 25px;
            right: 30px;
            background: rgba(255,255,255,0.2);
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.95em;
        }

        .content {
            padding: 45px 40px;
        }

        .progress {
            height: 6px;
            background: #e2e8f0;
            margin-bottom: 35px;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(to right, var(--primary), #ef5350);
            width: 0%;
            transition: width 0.4s ease;
        }

        #question-text {
            font-size: 1.55em;
            color: var(--dark);
            margin-bottom: 32px;
            font-weight: 600;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .option {
            padding: 22px 24px;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.4s;
            font-size: 1.1em;
        }

        .option:hover {
            border-color: var(--secondary);
            background: #f0f9ff;
            transform: translateY(-4px);
        }

        .option.selected {
            background: #f0fdf4;
            border-color: var(--accent);
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            margin-top: 40px;
            gap: 15px;
        }

        button {
            padding: 16px 36px;
            font-size: 1.1em;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }

        #next-btn {
            background: var(--primary);
            color: white;
        }

        #prev-btn {
            background: transparent;
            color: #64748b;
            border: 2px solid #cbd5e1;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <img src="https://i.postimg.cc/LJc7x94j/logo-utel.png" alt="Logo UTEL" class="logo">
            <h1>¿Qué Cultura Organizacional Eres?</h1>
            <p class="subtitle">Descubre con qué tipo de empresa mexicana te identificas más</p>
            <div class="badge">Empresas Mexicanas Edition 🇲🇽</div>
        </header>

        <div class="content">
            <div class="progress">
                <div id="progress-bar" class="progress-bar"></div>
            </div>

            <div id="quiz">
                <h2 id="question-text">Pregunta 1 de 5</h2>
                <div class="options" id="options"></div>

                <div class="navigation">
                    <button id="prev-btn" onclick="prevQuestion()">← Anterior</button>
                    <button id="next-btn" onclick="nextQuestion()">Siguiente →</button>
                </div>
            </div>

            <div id="result" class="result" style="display: none; text-align: center;">
                <h2>¡Felicidades! Esta es tu cultura:</h2>
                <div id="culture-result" style="background: #f8fafc; border-radius: 20px; padding: 40px; margin: 30px 0; border: 1px solid #e2e8f0;"></div>

                <h3>¿Qué significa esto?</h3>
                <p id="description" style="font-size: 1.15em; max-width: 620px; margin: 0 auto 25px;"></p>

                <h3>Beneficios principales:</h3>
                <ul id="benefits" style="max-width: 420px; margin: 0 auto 30px; text-align: left;"></ul>

                <h3>Ejemplos de empresas mexicanas:</h3>
                <p id="examples" style="font-size: 1.25em; color: var(--primary); font-weight: 700;"></p>

                <button onclick="reiniciarJuego()" style="margin-top: 20px; padding: 18px 40px; font-size: 1.15em;">
                    Realizar el test nuevamente
                </button>
            </div>
        </div>
    </div>

    <script>
        const preguntas = [
            {
                pregunta: "En el trabajo, ¿qué valoras más?",
                opciones: [
                    { texto: "Sentirme parte de una familia y que me apoyen", valor: "familiar" },
                    { texto: "Poder proponer ideas nuevas y creativas", valor: "creativa" },
                    { texto: "Ganar, competir y obtener buenos resultados", valor: "competitiva" },
                    { texto: "Que todo esté bien organizado y con reglas claras", valor: "estructurada" }
                ]
            },
            {
                pregunta: "Cuando hay un problema en la empresa, ¿qué prefieres?",
                opciones: [
                    { texto: "Que todos nos reunamos y lo resolvamos juntos como equipo", valor: "familiar" },
                    { texto: "Probar soluciones nuevas aunque sean arriesgadas", valor: "creativa" },
                    { texto: "Que se tome la decisión que más beneficie las ventas o ganancias", valor: "competitiva" },
                    { texto: "Seguir el procedimiento establecido y respetar la cadena de mando", valor: "estructurada" }
                ]
            },
            {
                pregunta: "¿Cómo te gustaría que sea tu jefe?",
                opciones: [
                    { texto: "Como un líder cercano, que se preocupe por mí", valor: "familiar" },
                    { texto: "Alguien que motive la innovación y las ideas locas", valor: "creativa" },
                    { texto: "Alguien exigente que me impulse a dar lo mejor", valor: "competitiva" },
                    { texto: "Alguien claro que dé instrucciones precisas y justas", valor: "estructurada" }
                ]
            },
            {
                pregunta: "En una empresa ideal, ¿qué es más importante?",
                opciones: [
                    { texto: "La lealtad y el buen ambiente entre compañeros", valor: "familiar" },
                    { texto: "La creatividad y adaptarse rápido a los cambios", valor: "creativa" },
                    { texto: "Ser mejor que la competencia y crecer constantemente", valor: "competitiva" },
                    { texto: "La eficiencia, el orden y el control de procesos", valor: "estructurada" }
                ]
            },
            {
                pregunta: "Cuando hay un cambio grande en la empresa, ¿cómo reaccionas?",
                opciones: [
                    { texto: "Me preocupa si afecta al equipo y las relaciones", valor: "familiar" },
                    { texto: "¡Me emociona! Es una oportunidad para innovar", valor: "creativa" },
                    { texto: "Lo veo como una oportunidad para ganar más mercado", valor: "competitiva" },
                    { texto: "Prefiero que se planee bien y se comunique claramente", valor: "estructurada" }
                ]
            }
        ];

        let respuestas = [];
        let preguntaActual = 0;

        function actualizarProgreso() {
            const porcentaje = ((preguntaActual) / preguntas.length) * 100;
            document.getElementById("progress-bar").style.width = `${porcentaje}%`;
        }

        function mostrarPregunta() {
            document.getElementById("question-text").textContent = `Pregunta ${preguntaActual + 1} de ${preguntas.length}`;

            const optionsDiv = document.getElementById("options");
            optionsDiv.innerHTML = "";

            preguntas[preguntaActual].opciones.forEach((opcion, index) => {
                const div = document.createElement("div");
                div.className = "option";
                div.textContent = opcion.texto;
                div.onclick = () => seleccionarRespuesta(index);
                optionsDiv.appendChild(div);
            });

            actualizarProgreso();
            actualizarBotones();
        }

        function seleccionarRespuesta(index) {
            respuestas[preguntaActual] = preguntas[preguntaActual].opciones[index].valor;

            const options = document.querySelectorAll(".option");
            options.forEach((opt, i) => {
                opt.classList.toggle("selected", i === index);
            });

            actualizarBotones();
        }

        function actualizarBotones() {
            document.getElementById("next-btn").style.display = respuestas[preguntaActual] ? "block" : "none";
            document.getElementById("prev-btn").style.display = preguntaActual > 0 ? "block" : "none";
        }

        function nextQuestion() {
            if (respuestas[preguntaActual]) {
                preguntaActual++;
                if (preguntaActual < preguntas.length) {
                    mostrarPregunta();
                } else {
                    mostrarResultado();
                }
            }
        }

        function prevQuestion() {
            if (preguntaActual > 0) {
                preguntaActual--;
                mostrarPregunta();
            }
        }

        function calcularCultura() {
            const conteo = { familiar: 0, creativa: 0, competitiva: 0, estructurada: 0 };
            respuestas.forEach(res => conteo[res]++);
            
            let max = -1;
            let culturaGanadora = "familiar";
            for (let tipo in conteo) {
                if (conteo[tipo] > max) {
                    max = conteo[tipo];
                    culturaGanadora = tipo;
                }
            }
            return culturaGanadora;
        }

        function mostrarResultado() {
            document.getElementById("quiz").style.display = "none";
            document.getElementById("result").style.display = "block";

            const tipo = calcularCultura();
            let titulo = "", emoji = "", descripcion = "", beneficios = [], ejemplos = "";

            switch(tipo) {
                case "familiar":
                    titulo = "Cultura Familiar"; emoji = "👨‍👩‍👧‍👦";
                    descripcion = "Es como trabajar en una gran familia. Se valora mucho la confianza, el apoyo mutuo y la lealtad.";
                    beneficios = ["Alta motivación y compromiso", "Baja rotación de personal", "Buen clima laboral"];
                    ejemplos = "Grupo Bimbo, FEMSA (OXXO), Liverpool";
                    break;
                case "creativa":
                    titulo = "Cultura Creativa"; emoji = "💡";
                    descripcion = "Se fomenta la creatividad, las ideas nuevas y la capacidad de adaptarse rápidamente.";
                    beneficios = ["Alta innovación", "Adaptación rápida al mercado", "Ambiente dinámico"];
                    ejemplos = "Cinépolis, Kavak, Clip";
                    break;
                case "competitiva":
                    titulo = "Cultura Competitiva"; emoji = "🏆";
                    descripcion = "Se enfoca en los resultados, la competencia y en ser los mejores del mercado.";
                    beneficios = ["Crecimiento rápido", "Alta productividad", "Recompensas por desempeño"];
                    ejemplos = "América Móvil (Telcel), Grupo Salinas";
                    break;
                case "estructurada":
                    titulo = "Cultura Estructurada"; emoji = "📋";
                    descripcion = "Todo está bien organizado, con procesos claros, reglas definidas y orden.";
                    beneficios = ["Estabilidad", "Eficiencia operativa", "Claridad en roles"];
                    ejemplos = "Banorte, Cemex";
                    break;
            }

            document.getElementById("culture-result").innerHTML = `
                <span style="font-size: 5.5em; display: block; margin-bottom: 15px;">${emoji}</span>
                <h2 style="color: #c62828; margin-bottom: 20px;">${titulo}</h2>
            `;

            document.getElementById("description").textContent = descripcion;

            const benefitsList = document.getElementById("benefits");
            benefitsList.innerHTML = "";
            beneficios.forEach(b => {
                const li = document.createElement("li");
                li.textContent = "• " + b;
                benefitsList.appendChild(li);
            });

            document.getElementById("examples").innerHTML = ejemplos;
        }

        function reiniciarJuego() {
            respuestas = [];
            preguntaActual = 0;
            document.getElementById("quiz").style.display = "block";
            document.getElementById("result").style.display = "none";
            mostrarPregunta();
        }

        // Iniciar
        window.onload = mostrarPregunta;
    </script>
</body>
</html>
